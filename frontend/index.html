    <title>Izozo Marketplace</title>
    <script>
      // Redirect clean URLs to hash URLs
      (function() {
        if (window.location.hash === '' && window.location.pathname !== '/') {
          window.location.href = '/#' + window.location.pathname;
        }
      })();
    </script>
